name: Scrape Facebook Reviews

on:
  schedule:
    - cron: "0 10 * * 1"   # Every Monday at 10:00 AM UTC (1 hour after Angi)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          WEBSCRAPING_AI_KEY_FB: ${{ secrets.WEBSCRAPING_AI_KEY_FB }}
        run: python scrape_facebook_reviews.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add facebook_reviews.json
          git diff --cached --quiet || git commit -m "Update Facebook reviews data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
